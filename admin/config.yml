# ==================== BACKEND ====================
backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: 'Create {{collection}} “{{slug}}”'
    update: 'Update {{collection}} “{{slug}}”'
    delete: 'Delete {{collection}} “{{slug}}”'
    uploadMedia: 'Upload “{{path}}”'
    deleteMedia: 'Delete “{{path}}”'

# ==================== MEDIA FOLDER ====================
media_folder: "images/uploads"
public_folder: "/images/uploads"

# ==================== COLLECTIONS ====================
collections:
  # ---------- HERO IMAGES ----------
  - name: "hero"
    label: "Hero Slider Images"
    folder: "data/hero"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: "Image", name: "image", widget: "image", media_library: { config: { multiple: false } } }
      - { label: "Alt Text", name: "alt", widget: "string", default: "Hamstone High School" }
      - { label: "Order", name: "order", widget: "number", default: 0, value_type: "int" }

  # ---------- EVENTS ----------
  - name: "events"
    label: "Events"
    folder: "data/events"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "MMMM D, YYYY" }
      - { label: "Image", name: "image", widget: "image", media_library: { config: { multiple: false } } }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }

  # ---------- GALLERY ----------
  - name: "gallery"
    label: "Photo Gallery"
    folder: "data/gallery"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: "Image", name: "src", widget: "image" }
      - { label: "Alt Text", name: "alt", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["sports", "academics", "events", "campus"] }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }

  # ---------- STAFF ----------
  - name: "staff"
    label: "Staff Directory"
    folder: "data/staff"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Subject / Role", name: "subject", widget: "string" }
      - { label: "Photo", name: "image", widget: "image", media_library: { config: { multiple: false } } }
      - { label: "Bio (Optional)", name: "bio", widget: "text", required: false }

  # ---------- NEWS / ANNOUNCEMENTS ----------
  - name: "news"
    label: "News & Announcements"
    folder: "data/news"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", default: "", format: "MMMM D, YYYY" }
      - { label: "Content", name: "content", widget: "markdown" }
      - { label: "Image (Optional)", name: "image", widget: "image", required: false }

  # ---------- ABOUT / STATS ----------
  - name: "about"
    label: "About Section"
    folder: "data/about"
    create: false
    delete: false
    slug: "about"
    fields:
      - { label: "Title", name: "title", widget: "string", default: "About Hamstone High" }
      - { label: "Description", name: "description", widget: "markdown" }
      - { label: "Stats", name: "stats", widget: "list", fields:
          - { label: "Number", name: "number", widget: "number" }
          - { label: "Label", name: "label", widget: "string" }
        }